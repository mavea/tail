name: Go Quality & Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'
          cache: true

      - name: Check Format (gofmt)
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            gofmt -d .
            exit 1
          fi

      - name: Install and Run Golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.6

      - name: Run Gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -quiet ./...

      - name: Go Mod Verify
        run: go mod verify

  generate-check:
    name: Mocks Generation Check
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'
          cache: true

      - name: Install Mockery
        run: go install github.com/vektra/mockery/v2@latest

      - name: Run Go Generate
        run: go generate ./tests/mocks

      - name: Check for changes
        run: |
          if [ -n "$(git status --porcelain tests/mocks)" ]; then
            echo "Mocks are out of date. Please run 'make generate' and commit the changes."
            git diff tests/mocks
            exit 1
          fi

  unit-test:
    name: Unit Tests
    needs: generate-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'
          cache: true

      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@v2.27.3

      - name: Run Ginkgo Tests
        run: ginkgo -r ./...

  build-and-verify:
    name: Build and Verify
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Application (same as make build toolchain)
        run: |
          mkdir -p .temp
          cp tail .temp/tail.repo
          docker run --rm \
            -v "$PWD/.temp:/app" \
            -v "$PWD:/src" \
            -w /src \
            golang:1.25.3-alpine3.22 \
            sh -c "go mod download && sh ./tools/make/sh/build.sh /app/tail ./cmd/"

      - name: Verify Binary Match
        run: |
          if ! cmp -s .temp/tail.repo .temp/tail; then
            echo "Built binary does not match committed ./tail"
            sha256sum .temp/tail.repo .temp/tail || true
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tail-binary
          path: .temp/tail

  integration-test:
    name: Integration Tests
    needs: build-and-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'
          cache: true

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: tail-binary
          path: .temp

      - name: Run Integration Tests
        run: |
          go build -trimpath -ldflags="-w -s -X tail/internal/bootstrap.Version=integration.tests -X tail/internal/bootstrap.BuildTime=0000.00.00" -o .temp/tail ./cmd/main.go
          chmod +x .temp/tail
          chmod +x ./tools/make/sh/tests/integration_tests.sh
          ./tools/make/sh/tests/integration_tests.sh ./tests/integration .temp