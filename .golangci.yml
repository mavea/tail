version: "2"
run:
  modules-download-mode: readonly
linters:
  default: none
  enable:
    - revive
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    revive:
      rules:
        - name: unhandled-error
          arguments: ["-allowPackages", "github.com/onsi/gomega,github.com/onsi/ginkgo/v2"]
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/my/project
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$